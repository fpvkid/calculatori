<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | calcsfor.life</title>
    <meta name="description" content="Get in touch with calcsfor.life. Send feedback, report bugs, suggest a new calculator, or ask questions.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://calcsfor.life/contact.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared/global.css">
    <style>
        .contact-page { padding: 120px 0 80px; }
        .contact-inner { max-width: 560px; margin: 0 auto; }
        .contact-inner h1 { font-size: 2.2rem; margin-bottom: 12px; }
        .contact-intro { color: var(--clr-text-muted); font-size: 0.95rem; line-height: 1.7; margin-bottom: 36px; }
        .contact-form { display: flex; flex-direction: column; gap: 20px; }
        .contact-form label { font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; display: block; }
        .contact-form textarea { min-height: 140px; resize: vertical; line-height: 1.6; }
        .contact-success {
            display: none;
            background: rgba(80, 200, 120, 0.1);
            border: 1px solid rgba(80, 200, 120, 0.3);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            color: #6fd68a;
            font-size: 0.92rem;
        }
        .contact-success.show { display: block; }
    </style>
</head>
<body>

    <main class="contact-page">
        <div class="container">
            <div class="contact-inner">
                <h1>Contact us</h1>
                <p class="contact-intro">Found a bug? Have a suggestion for a new calculator? Want to report an issue or just say hi? Drop a message below and we'll get back to you.</p>

                <div class="contact-success" id="contact-success">
                    Message sent. We'll get back to you as soon as we can.
                </div>

                <form class="contact-form" id="contact-form">
                    <div>
                        <label for="contact-name">Your name</label>
                        <input type="text" id="contact-name" name="name" placeholder="Alex" required>
                    </div>
                    <div>
                        <label for="contact-email">Email address</label>
                        <input type="email" id="contact-email" name="email" placeholder="alex@example.com" required>
                    </div>
                    <div>
                        <label for="contact-subject">Subject</label>
                        <input type="text" id="contact-subject" name="subject" placeholder="Bug report, suggestion, question...">
                    </div>
                    <div>
                        <label for="contact-message">Message</label>
                        <textarea id="contact-message" name="message" placeholder="Tell us what's on your mind..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="contact-submit">Send message</button>
                </form>
            </div>
        </div>
    </main>

    <script src="shared/header.js" defer></script>
    <script src="shared/footer.js" defer></script>
    <script>
        // Contact form (demo: just shows success message)
        var contactForm = document.getElementById('contact-form');
        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            contactForm.style.display = 'none';
            document.getElementById('contact-success').classList.add('show');
        });
    </script>
</body>
</html>
